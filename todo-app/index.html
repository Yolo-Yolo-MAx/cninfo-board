<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>待办事项</title>
  <style>
    /* ===== Reset & Base ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px 60px;
    }

    /* ===== Card Container ===== */
    .app {
      width: 100%;
      max-width: 560px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
      overflow: hidden;
    }

    /* ===== Header ===== */
    .header {
      background: linear-gradient(135deg, #667eea, #764ba2);
      padding: 32px 28px 24px;
      color: #fff;
    }
    .header h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    .header .subtitle {
      font-size: 13px;
      opacity: .75;
    }
    .stats-row {
      display: flex;
      gap: 20px;
      margin-top: 18px;
    }
    .stat {
      text-align: center;
    }
    .stat .num {
      font-size: 22px;
      font-weight: 700;
    }
    .stat .label {
      font-size: 11px;
      opacity: .7;
      margin-top: 2px;
    }

    /* ===== Input Area ===== */
    .input-area {
      padding: 24px 24px 16px;
      border-bottom: 1px solid #f0f0f0;
    }
    .input-row {
      display: flex;
      gap: 10px;
    }
    .input-row input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e8e8e8;
      border-radius: 12px;
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
      color: #333;
    }
    .input-row input[type="text"]:focus {
      border-color: #667eea;
    }
    .input-row input[type="text"]::placeholder {
      color: #bbb;
    }
    .btn-add {
      padding: 12px 20px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 22px;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
      line-height: 1;
    }
    .btn-add:hover { opacity: .9; }
    .btn-add:active { transform: scale(.95); }

    /* Priority & Due Date */
    .input-extras {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      align-items: center;
    }
    .input-extras select,
    .input-extras input[type="date"] {
      flex: 1;
      padding: 8px 12px;
      border: 2px solid #e8e8e8;
      border-radius: 10px;
      font-size: 13px;
      color: #555;
      outline: none;
      background: #fff;
      transition: border-color .2s;
    }
    .input-extras select:focus,
    .input-extras input[type="date"]:focus {
      border-color: #667eea;
    }

    /* ===== Filter Tabs ===== */
    .filter-bar {
      display: flex;
      gap: 6px;
      padding: 14px 24px 10px;
      border-bottom: 1px solid #f0f0f0;
      overflow-x: auto;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .tab {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      border: 1px solid #e0e0e0;
      background: transparent;
      color: #666;
      transition: all .2s;
    }
    .tab.active {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      border-color: transparent;
    }
    .tab:not(.active):hover {
      border-color: #667eea;
      color: #667eea;
    }

    /* ===== Task List ===== */
    .task-list {
      padding: 8px 24px 16px;
      min-height: 120px;
    }

    .empty-state {
      text-align: center;
      padding: 48px 0;
      color: #ccc;
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    /* Task Item */
    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid #f5f5f5;
      animation: slideIn .25s ease;
    }
    .task-item:last-child { border-bottom: none; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Checkbox */
    .task-check {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid #d0d0d0;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s;
      background: transparent;
    }
    .task-check.checked {
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-color: transparent;
    }
    .task-check.checked::after {
      content: "✓";
      color: #fff;
      font-size: 12px;
      font-weight: 700;
    }
    .task-check:not(.checked):hover {
      border-color: #667eea;
    }

    /* Task Body */
    .task-body { flex: 1; min-width: 0; }

    .task-text {
      font-size: 14px;
      color: #333;
      line-height: 1.5;
      word-break: break-word;
      transition: color .2s;
    }
    .task-item.done .task-text {
      text-decoration: line-through;
      color: #bbb;
    }

    .task-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 5px;
      flex-wrap: wrap;
    }

    /* Priority Badge */
    .badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 600;
    }
    .badge-high   { background: #fff0f0; color: #e53935; }
    .badge-medium { background: #fff8e1; color: #f57c00; }
    .badge-low    { background: #e8f5e9; color: #388e3c; }

    /* Due Date */
    .due-date {
      font-size: 11px;
      color: #999;
    }
    .due-date.overdue { color: #e53935; font-weight: 600; }

    /* Edit Input */
    .task-edit-input {
      width: 100%;
      border: none;
      border-bottom: 2px solid #667eea;
      font-size: 14px;
      color: #333;
      outline: none;
      padding: 2px 0;
      background: transparent;
    }

    /* Actions */
    .task-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity .2s;
    }
    .task-item:hover .task-actions { opacity: 1; }

    .action-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      font-size: 15px;
      transition: background .15s;
      color: #888;
    }
    .action-btn:hover { background: #f0f0f0; }
    .action-btn.delete:hover { background: #fff0f0; color: #e53935; }

    /* ===== Footer ===== */
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      border-top: 1px solid #f0f0f0;
      font-size: 12px;
      color: #aaa;
    }
    .btn-clear {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 12px;
      color: #bbb;
      padding: 4px 8px;
      border-radius: 6px;
      transition: all .2s;
    }
    .btn-clear:hover { color: #e53935; background: #fff0f0; }

    /* ===== Responsive ===== */
    @media (max-width: 400px) {
      .header { padding: 24px 20px 18px; }
      .input-area, .filter-bar, .task-list, .footer { padding-left: 16px; padding-right: 16px; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <h1>📋 我的待办</h1>
    <div class="subtitle">Keep it simple, get it done.</div>
    <div class="stats-row">
      <div class="stat"><div class="num" id="statTotal">0</div><div class="label">全部</div></div>
      <div class="stat"><div class="num" id="statActive">0</div><div class="label">待完成</div></div>
      <div class="stat"><div class="num" id="statDone">0</div><div class="label">已完成</div></div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-row">
      <input type="text" id="taskInput" placeholder="添加新任务，按 Enter 确认…" maxlength="100" />
      <button class="btn-add" id="btnAdd" title="添加">＋</button>
    </div>
    <div class="input-extras">
      <select id="prioritySelect">
        <option value="medium">⚡ 普通</option>
        <option value="high">🔴 高优先级</option>
        <option value="low">🟢 低优先级</option>
      </select>
      <input type="date" id="dueDate" title="截止日期" />
    </div>
  </div>

  <!-- Filter -->
  <div class="filter-bar">
    <button class="tab active" data-filter="all">全部</button>
    <button class="tab" data-filter="active">待完成</button>
    <button class="tab" data-filter="done">已完成</button>
    <button class="tab" data-filter="high">🔴 高优先</button>
    <button class="tab" data-filter="overdue">⚠️ 已逾期</button>
  </div>

  <!-- Task List -->
  <div class="task-list" id="taskList"></div>

  <!-- Footer -->
  <div class="footer">
    <span id="footerInfo">暂无任务</span>
    <button class="btn-clear" id="btnClearDone">清除已完成</button>
  </div>

</div>

<script>
  /* ===== State ===== */
  let tasks = JSON.parse(localStorage.getItem('wb_todos') || '[]');
  let currentFilter = 'all';
  let editingId = null;

  /* ===== Persistence ===== */
  function save() {
    localStorage.setItem('wb_todos', JSON.stringify(tasks));
  }

  /* ===== Helpers ===== */
  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  }

  function isOverdue(task) {
    if (!task.due || task.done) return false;
    const today = new Date(); today.setHours(0,0,0,0);
    return new Date(task.due) < today;
  }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr + 'T00:00:00');
    const today = new Date(); today.setHours(0,0,0,0);
    const diff = Math.round((d - today) / 86400000);
    if (diff === 0) return '今天到期';
    if (diff === 1) return '明天到期';
    if (diff === -1) return '昨天逾期';
    if (diff < 0) return `逾期 ${-diff} 天`;
    return `${d.getMonth()+1}月${d.getDate()}日`;
  }

  /* ===== Render ===== */
  function getFiltered() {
    const today = new Date(); today.setHours(0,0,0,0);
    return tasks.filter(t => {
      if (currentFilter === 'active') return !t.done;
      if (currentFilter === 'done')   return t.done;
      if (currentFilter === 'high')   return t.priority === 'high' && !t.done;
      if (currentFilter === 'overdue') return isOverdue(t);
      return true;
    });
  }

  function render() {
    const list = document.getElementById('taskList');
    const filtered = getFiltered();

    // Stats
    document.getElementById('statTotal').textContent  = tasks.length;
    document.getElementById('statActive').textContent = tasks.filter(t => !t.done).length;
    document.getElementById('statDone').textContent   = tasks.filter(t => t.done).length;

    // Footer
    const active = tasks.filter(t => !t.done).length;
    document.getElementById('footerInfo').textContent =
      tasks.length === 0 ? '暂无任务' : `还有 ${active} 项待完成`;

    if (filtered.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="icon">${currentFilter === 'done' ? '🎉' : '✨'}</div>
          <p>${currentFilter === 'done' ? '暂无已完成的任务' : '这里还没有任务'}</p>
        </div>`;
      return;
    }

    list.innerHTML = filtered.map(task => {
      const overdue = isOverdue(task);
      const priorityLabel = { high:'高优先', medium:'普通', low:'低优先' }[task.priority] || '';
      const badgeClass = `badge badge-${task.priority}`;

      const dateHtml = task.due
        ? `<span class="due-date ${overdue ? 'overdue' : ''}">${overdue ? '⚠️ ' : '📅 '}${formatDate(task.due)}</span>`
        : '';

      const textHtml = editingId === task.id
        ? `<input class="task-edit-input" id="editInput_${task.id}" value="${task.text.replace(/"/g,'&quot;')}" />`
        : `<span class="task-text">${escHtml(task.text)}</span>`;

      return `
        <div class="task-item ${task.done ? 'done' : ''}" data-id="${task.id}">
          <div class="task-check ${task.done ? 'checked' : ''}" data-action="toggle" data-id="${task.id}"></div>
          <div class="task-body">
            ${textHtml}
            <div class="task-meta">
              <span class="${badgeClass}">${priorityLabel}</span>
              ${dateHtml}
            </div>
          </div>
          <div class="task-actions">
            ${editingId === task.id
              ? `<button class="action-btn" data-action="save" data-id="${task.id}" title="保存">💾</button>`
              : `<button class="action-btn" data-action="edit" data-id="${task.id}" title="编辑">✏️</button>`
            }
            <button class="action-btn delete" data-action="delete" data-id="${task.id}" title="删除">🗑️</button>
          </div>
        </div>`;
    }).join('');

    // Focus edit input
    if (editingId) {
      const inp = document.getElementById(`editInput_${editingId}`);
      if (inp) { inp.focus(); inp.select(); }
    }
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ===== Actions ===== */
  function addTask() {
    const input = document.getElementById('taskInput');
    const text = input.value.trim();
    if (!text) { input.focus(); return; }

    tasks.unshift({
      id: uid(),
      text,
      done: false,
      priority: document.getElementById('prioritySelect').value,
      due: document.getElementById('dueDate').value || null,
      createdAt: Date.now()
    });

    input.value = '';
    document.getElementById('dueDate').value = '';
    document.getElementById('prioritySelect').value = 'medium';
    save();
    render();
    input.focus();
  }

  function toggleTask(id) {
    const t = tasks.find(t => t.id === id);
    if (t) { t.done = !t.done; save(); render(); }
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    if (editingId === id) editingId = null;
    save();
    render();
  }

  function startEdit(id) {
    editingId = id;
    render();
  }

  function saveEdit(id) {
    const inp = document.getElementById(`editInput_${id}`);
    if (!inp) return;
    const val = inp.value.trim();
    if (val) {
      const t = tasks.find(t => t.id === id);
      if (t) t.text = val;
    }
    editingId = null;
    save();
    render();
  }

  function clearDone() {
    tasks = tasks.filter(t => !t.done);
    save();
    render();
  }

  /* ===== Event Delegation ===== */
  document.getElementById('taskList').addEventListener('click', e => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const { action, id } = btn.dataset;
    if (action === 'toggle') toggleTask(id);
    if (action === 'delete') deleteTask(id);
    if (action === 'edit')   startEdit(id);
    if (action === 'save')   saveEdit(id);
  });

  // Edit input: Enter saves, Escape cancels
  document.getElementById('taskList').addEventListener('keydown', e => {
    if (!editingId) return;
    if (e.key === 'Enter')  saveEdit(editingId);
    if (e.key === 'Escape') { editingId = null; render(); }
  });

  // Add button
  document.getElementById('btnAdd').addEventListener('click', addTask);
  document.getElementById('taskInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  // Filter tabs
  document.querySelector('.filter-bar').addEventListener('click', e => {
    const tab = e.target.closest('.tab');
    if (!tab) return;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentFilter = tab.dataset.filter;
    render();
  });

  // Clear done
  document.getElementById('btnClearDone').addEventListener('click', clearDone);

  /* ===== Init ===== */
  render();
</script>
</body>
</html>
