      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden; flex-shrink: 0;

    .filter-tab {

  const todayRecords = [];
  let currentFilter = 'all';
  let searchQuery = '';
  const today = new Date().toISOString().slice(0, 10);

  function updateStats() {
    document.getElementById('stat-total').textContent = allRecords.length;
    document.getElementById('stat-today').textContent = todayRecords.length;
    document.getElementById('stat-zz').textContent = allRecords.filter(r => r.type === '重整').length;
    document.getElementById('stat-pm').textContent = allRecords.filter(r => r.type === '拍卖').length;
    document.getElementById('count-all').textContent = allRecords.length;
    document.getElementById('count-zz').textContent = allRecords.filter(r => r.type === '重整').length;
    document.getElementById('count-pm').textContent = allRecords.filter(r => r.type === '拍卖').length;
  }

  function getFiltered() {
    let records = allRecords;
    if (currentFilter !== 'all') records = records.filter(r => r.type === currentFilter);
    if (searchQuery.trim()) {
      const q = searchQuery.toLowerCase();
      records = records.filter(r =>
        (r.stock_code || '').toLowerCase().includes(q) ||
        (r.company || '').toLowerCase().includes(q) ||
        (r.title || '').toLowerCase().includes(q) ||
        (r.industry || '').toLowerCase().includes(q)
      );
    }
    return records;
  }

  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function render() {
    const container = document.getElementById('card-list');
    const filtered = getFiltered();
    if (filtered.length === 0) {
      container.innerHTML = '<div class="empty-state"><p>暂无符合条件的公告</p></div>';
      return;
    }
    const todayUrls = new Set(todayRecords.map(r => r.url));
    container.innerHTML = filtered.map(r => {
      const isToday = todayUrls.has(r.url);
      const dp = (r.announcement_date || '').split('-');
      const dateStr = dp.length === 3 ? dp[1] + '-' + dp[2] : r.announcement_date;
      const yearStr = dp.length === 3 ? dp[0] : '';
      return '<div class="card' + (isToday ? ' today-new' : '') + '">' +
        '<div class="card-left">' +
          '<span class="type-badge ' + (r.type === '重整' ? 'zz' : 'pm') + '">' + escapeHtml(r.type) + '</span>' +
          '<div class="card-date"><div>' + dateStr + '</div><div>' + yearStr + '</div></div>' +
        '</div>' +
        '<div class="card-body">' +
          '<div class="card-title"><a href="' + escapeHtml(r.url) + '" target="_blank" rel="noopener">' + escapeHtml(r.title) + '</a></div>' +
          '<div class="card-meta">' +
            '<div class="card-meta-item"><span class="label">行业</span><span class="card-industry">' + escapeHtml(r.industry || '—') + '</span></div>' +
            (r.brief ? '<div class="card-brief">' + escapeHtml(r.brief) + '</div>' : '') +
          '</div>' +
        '</div>' +
        '<div class="card-right">' +
          '<div class="stock-code">' + escapeHtml(r.stock_code) + '</div>' +
          '<div class="company-name">' + escapeHtml(r.company) + '</div>' +
          '<a class="card-link" href="' + escapeHtml(r.url) + '" target="_blank" rel="noopener">查看公告 →</a>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  function downloadExcel(records, filename) {
    if (!records || records.length === 0) { alert('没有可导出的数据'); return; }
    const data = records.map(r => ({
      '股票代码': r.stock_code || '',
      '公司名称': r.company || '',
      '公告日期': r.announcement_date || '',
      '公告类型': r.type || '',
      '公告标题': r.title || '',
      '所属行业': r.industry || '',
      '公司简介': r.brief || '',
      '公告链接': r.url || '',
    }));
    const ws = XLSX.utils.json_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '公告列表');
    ws['!cols'] = [{ wch: 10 }, { wch: 20 }, { wch: 12 }, { wch: 8 }, { wch: 40 }, { wch: 30 }, { wch: 50 }, { wch: 50 }];
    XLSX.writeFile(wb, filename);
  }

  document.querySelectorAll('.filter-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      render();
    });
  });

  let searchTimer;
  document.getElementById('search-input').addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => { searchQuery = e.target.value; render(); }, 250);
  });

  document.getElementById('btn-all').addEventListener('click', () => downloadExcel(allRecords, `公告全部_${today}.xlsx`));
  document.getElementById('btn-today').addEventListener('click', () => downloadExcel(todayRecords, `公告今日_${today}.xlsx`));

  updateStats();
  render();
  console.log('公告看板加载完成，共', allRecords.length, '条记录');
})();
</script>
